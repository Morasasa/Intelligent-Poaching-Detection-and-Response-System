services:
  - type: web
    name: guardianai-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: PYTHONPATH=backend uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: MONGO_URI
        sync: false
      - key: DATABASE_NAME
        value: poaching_detection_db
      - key: JWT_SECRET
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: OFFICER_EMAIL
        sync: false
      - key: EMAILS_FROM_EMAIL
        sync: false
      - key: EMAILS_FROM_NAME
        value: GuardianAI Security
